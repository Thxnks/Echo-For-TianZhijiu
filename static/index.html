<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Claude</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Claude" />
  <meta name="theme-color" content="#F7FAFC" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <!-- 视觉风格 / 壁纸 / 头像取自开源项目 Tidal_Echo（MIT License），蓝色「珍珠潮汐」主题改编 -->
  <style>
    /* Newsreader（OFL 开源衬线，自托管） */
    @font-face{ font-family:"Newsreader"; font-weight:400; font-style:normal; font-display:swap;
      src:url("/static/newsreader-400.woff2") format("woff2"); }
    @font-face{ font-family:"Newsreader"; font-weight:500; font-style:normal; font-display:swap;
      src:url("/static/newsreader-500.woff2") format("woff2"); }
    :root{
      --bg:#F7FAFC;
      --text:#253447;
      --text-soft:#5E7080;
      --text-faint:#8A99A8;
      --hairline:rgba(120,142,165,.24);
      --bubble-ai-bg:rgba(255,255,255,.42);
      --bubble-human-bg:rgba(210,224,240,.48);
      --bubble-fg:#243343;
      --accent:#4C6378;
      --send-bg:#2C4056;
      --composer-bg:rgba(238,244,250,.66);
      --field-bg:rgba(247,250,252,.92);
      --field-line:rgba(151,169,181,.30);
      --soft-shadow:0 8px 22px rgba(86,104,118,.08);
      --panel-bg:rgba(244,248,250,.62);
      --typing:#4F9FDA;
      --wall:url("/static/chat-light.webp");
      --avatar:url("/static/avatar-sea.png");
      --font-cn:"Songti SC","Noto Serif CJK SC","Noto Serif SC","STSong","SimSun",serif;
      --font-ui:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
      --font-msg:"Songti SC","Noto Serif CJK SC","STSong","SimSun","Newsreader",Georgia,serif;
      --radius:20px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    /* iOS PWA 白边修复：html / body / #app 统一用 100vh，不混用 100% / 100dvh / fixed body */
    html,body{ margin:0; height:100vh; overflow:hidden; overscroll-behavior:none; }
    body{
      background:var(--bg); color:var(--text);
      font-family:var(--font-msg); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    }
    /* ── 壁纸（来自 Tidal_Echo） ── */
    .wall{
      position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0;
      background-color:var(--bg);
      background-image:var(--wall);
      background-size:cover; background-position:center;
      transform:translateZ(0);
    }
    .wall::after{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,.12) 30%, rgba(255,255,255,.04) 68%, rgba(255,255,255,.22));
    }

    #app{ position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; }

    /* ── 顶栏 + 功能键（来自 Tidal_Echo） ── */
    header{
      position:relative; z-index:5; flex:none;
      display:flex; align-items:center; gap:6px;
      padding:calc(env(safe-area-inset-top) + 14px) 12px 12px;
      border-bottom:1px solid var(--hairline);
      -webkit-backdrop-filter:blur(14px) saturate(1.1); backdrop-filter:blur(14px) saturate(1.1);
      background:linear-gradient(180deg, rgba(247,250,252,.72), rgba(247,250,252,.30));
    }
    .hside{ flex:1 1 0; display:flex; align-items:center; min-width:0; }
    .hside.left{ justify-content:flex-start; }
    .hside.right{ justify-content:flex-end; gap:7px; }
    .peerpill{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; line-height:1.15; padding:0 4px; }
    .name{ font-family:var(--font-msg); font-size:23px; font-weight:500; letter-spacing:.5px; color:var(--text);
      white-space:nowrap; text-shadow:0 1px 18px rgba(255,255,255,.35); }
    .status{ font-size:12.5px; color:var(--text-soft); margin-top:3px; letter-spacing:.3px; white-space:nowrap; }
    .status.typing{ color:var(--typing); font-weight:500; display:inline-flex; align-items:center; }
    .dots{ display:inline-flex; gap:3px; margin-left:6px; }
    .dots i{ width:4px; height:4px; border-radius:50%; background:currentColor; animation:td 1.25s ease-in-out infinite; }
    .dots i:nth-child(2){ animation-delay:.16s; } .dots i:nth-child(3){ animation-delay:.32s; }
    @keyframes td{ 0%,70%,100%{ transform:translateY(0); opacity:.4; } 35%{ transform:translateY(-3px); opacity:1; } }

    .backbtn, .topbtn{
      flex:none; width:30px; height:30px; border:0; border-radius:50%; padding:0; background:transparent;
      color:var(--text); display:grid; place-items:center; cursor:pointer; transition:transform .15s ease;
    }
    .backbtn:active, .topbtn:active{ transform:scale(.9); }
    .backbtn svg{ width:21px; height:21px; }
    .topbtn svg{ width:21px; height:21px; }
    .topbtn.more svg{ width:19px; height:19px; }
    .topbtn.active{ color:var(--accent); }

    /* ── 消息区 ── */
    #log{ flex:1; overflow-y:auto; padding:18px 16px 8px; display:flex; flex-direction:column; gap:12px;
      scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
    .row{ display:flex; animation:rise .32s cubic-bezier(.22,1,.36,1); }
    .row.me{ justify-content:flex-end; }
    @keyframes rise{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    .bubble{
      max-width:76%; padding:11px 15px; font-size:16.5px; line-height:1.55;
      font-family:var(--font-msg);
      white-space:pre-wrap; word-break:break-word; color:var(--bubble-fg);
      border-radius:var(--radius); box-shadow:var(--soft-shadow);
      border:1px solid rgba(255,255,255,.45);
      -webkit-backdrop-filter:blur(10px) saturate(1.15); backdrop-filter:blur(10px) saturate(1.15);
    }
    .ai .bubble{ background:var(--bubble-ai-bg); border-bottom-left-radius:6px; }
    .me .bubble{ background:var(--bubble-human-bg); border-bottom-right-radius:6px; }

    /* ── 输入区 ── */
    footer{
      position:relative; z-index:5; flex:none; display:flex; align-items:flex-end; gap:10px;
      padding:10px 14px calc(env(safe-area-inset-bottom) + 12px);
      border-top:1px solid var(--hairline);
      -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); background:var(--composer-bg);
    }
    #input{
      flex:1; background:var(--field-bg); border:1px solid var(--field-line); color:var(--text);
      border-radius:22px; padding:11px 16px; font-size:16px; font-family:var(--font-msg);
      outline:none; resize:none; max-height:120px; line-height:1.4; box-shadow:inset 0 1px 2px rgba(80,100,118,.04);
    }
    #input::placeholder{ color:var(--text-faint); }
    #send{
      flex:none; width:44px; height:44px; border:none; border-radius:50%; background:var(--send-bg);
      color:#fff; display:grid; place-items:center; cursor:pointer; box-shadow:0 6px 16px rgba(44,64,86,.28);
      transition:transform .15s ease, opacity .15s;
    }
    #send:active{ transform:scale(.9); } #send:disabled{ opacity:.45; } #send svg{ width:20px; height:20px; }

    /* ── 个人信息面板（更多/API窗口 按钮打开） ── */
    .scrim{ position:fixed; inset:0; z-index:20; background:rgba(40,60,78,.18);
      -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .25s; }
    .scrim.show{ opacity:1; pointer-events:auto; }
    .panel{
      position:fixed; z-index:21; left:50%; top:50%; transform:translate(-50%,-46%) scale(.96);
      width:min(86vw,360px); max-height:74vh; overflow:auto; padding:22px 20px 24px;
      border-radius:24px; background:var(--panel-bg); border:1px solid rgba(150,168,182,.18);
      box-shadow:0 24px 60px rgba(40,60,78,.22); -webkit-backdrop-filter:blur(22px) saturate(1.2);
      backdrop-filter:blur(22px) saturate(1.2); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
    .panel.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
    .panel .pavatar{ width:72px; height:72px; border-radius:50%; margin:0 auto 12px; background-image:var(--avatar);
      background-size:cover; background-position:center; box-shadow:0 8px 20px rgba(40,60,78,.18); }
    .panel .pname{ text-align:center; font-family:var(--font-msg); font-size:23px; font-weight:500; letter-spacing:.5px; }
    .panel .psub{ text-align:center; font-size:12.5px; color:var(--text-faint); margin-top:2px; }
    .panel h4{ font-size:13px; color:var(--text-soft); font-weight:600; margin:20px 0 8px; letter-spacing:.4px; }
    .memlist{ display:flex; flex-direction:column; gap:7px; }
    .memitem{ font-size:14.5px; line-height:1.45; color:var(--text); background:rgba(255,255,255,.42);
      border:1px solid rgba(150,168,182,.16); border-radius:12px; padding:9px 12px; }
    .memempty{ font-size:13.5px; color:var(--text-faint); text-align:center; padding:14px; }

    /* ── 轻提示 toast ── */
    .toast{ position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 86px); transform:translateX(-50%) translateY(8px);
      z-index:30; background:rgba(37,52,71,.92); color:#fff; font-size:13.5px; padding:9px 16px; border-radius:999px;
      opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── 对话列表弹窗（右上角下拉） ── */
    .sesspop{ position:fixed; z-index:25; top:calc(env(safe-area-inset-top) + 64px); right:12px;
      width:min(80vw,300px); max-height:62vh; overflow:auto; padding:10px;
      border-radius:18px; background:var(--panel-bg); border:1px solid rgba(150,168,182,.18);
      box-shadow:0 18px 50px rgba(40,60,78,.22); -webkit-backdrop-filter:blur(20px) saturate(1.2);
      backdrop-filter:blur(20px) saturate(1.2);
      opacity:0; pointer-events:none; transform:translateY(-6px) scale(.98); transition:opacity .2s, transform .2s; }
    .sesspop.show{ opacity:1; pointer-events:auto; transform:none; }
    .sesshead{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 8px; }
    .sesshead span{ font-size:12px; color:var(--text-faint); }
    .sessnew{ border:1px solid var(--field-line); border-radius:999px; padding:5px 11px; background:transparent;
      color:var(--accent); font-family:var(--font-msg); font-size:12.5px; cursor:pointer; }
    .sessnew:active{ transform:scale(.95); }
    .sessitem{ padding:9px 11px; border-radius:12px; cursor:pointer; display:flex; flex-direction:column; gap:2px; }
    .sessitem.cur, .sessitem:active{ background:rgba(255,255,255,.5); }
    .sessitem .t{ font-size:14.5px; color:var(--text); }
    .sessitem .d{ font-size:11px; color:var(--text-faint); }
  </style>
</head>
<body>
  <div class="wall"></div>
  <div id="app">
    <header>
      <div class="hside left">
        <button class="backbtn" id="backBtn" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
        </button>
      </div>
      <div class="peerpill">
        <span class="name">Claude</span>
        <span class="status" id="status">在线</span>
      </div>
      <div class="hside right" aria-label="功能键">
        <button class="topbtn sessions" id="sessionBtn" type="button" aria-label="个人信息" title="个人信息">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="14" height="14" rx="3"/><path d="M8 3h9a4 4 0 0 1 4 4v9"/></svg>
        </button>
        <button class="topbtn terminal" id="terminalBtn" type="button" aria-label="终端视图" title="终端视图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m6 8 4 4-4 4"/><path d="M12 16h6"/></svg>
        </button>
        <button class="topbtn call" id="callBtn" type="button" aria-label="语音通话" title="语音通话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v2.4a2 2 0 0 1-2.2 2 19.4 19.4 0 0 1-8.4-3 19 19 0 0 1-5.9-5.9 19.4 19.4 0 0 1-3-8.4A2 2 0 0 1 4.5 2h2.4a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.4a15.6 15.6 0 0 0 6.6 6.6l1-1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 1.8z"/></svg>
        </button>
        <button class="topbtn more" id="moreBtn" type="button" aria-label="个人信息" title="个人信息">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
        </button>
      </div>
    </header>

    <div id="log"></div>

    <footer>
      <textarea id="input" rows="1" placeholder="说点什么…"></textarea>
      <button id="send" aria-label="发送">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12l16-8-6 8 6 8-16-8z" fill="currentColor"/></svg>
      </button>
    </footer>
  </div>

  <!-- 个人信息面板 -->
  <div class="scrim" id="scrim"></div>
  <div class="panel" id="panel">
    <div class="pavatar"></div>
    <div class="pname">Claude</div>
    <div class="psub">你的专属陪伴</div>
    <h4>TA 记得关于你的事</h4>
    <div class="memlist" id="memlist"></div>
  </div>

  <!-- 对话列表 -->
  <div class="sesspop" id="sesspop">
    <div class="sesshead">
      <span>对话</span>
      <button class="sessnew" id="sessNew">＋ 新建对话</button>
    </div>
    <div id="sessBody"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const scrim = document.getElementById('scrim');
    const panel = document.getElementById('panel');
    const memlist = document.getElementById('memlist');
    const toastEl = document.getElementById('toast');
    let lastId = 0;
    let sending = false;   // 发消息期间跳过 poll，防止竞态导致消息重复
    let toastTimer = null;

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    function setStatus(typing) {
      if (typing) {
        statusEl.className = 'status typing';
        statusEl.innerHTML = '正在输入<span class="dots"><i></i><i></i><i></i></span>';
      } else {
        statusEl.className = 'status';
        statusEl.textContent = '在线';
      }
    }

    function bubble(role, text) {
      const row = document.createElement('div');
      row.className = 'row ' + (role === 'user' ? 'me' : 'ai');
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      row.appendChild(b);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return b;
    }

    async function loadHistory() {
      try {
        const r = await fetch('/api/history');
        const d = await r.json();
        d.messages.forEach(m => { bubble(m.role, m.content); if (m.id) lastId = Math.max(lastId, m.id); });
      } catch (e) {}
    }

    async function poll() {
      if (document.visibilityState !== 'visible') return;
      if (sending) return;   // 正在发消息，等 sendMsg 返回再 poll
      try {
        const r = await fetch('/api/poll?after=' + lastId);
        const d = await r.json();
        d.messages.forEach(m => { bubble(m.role, m.content); lastId = Math.max(lastId, m.id); });
      } catch (e) {}
    }
    setInterval(poll, 5000);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') poll(); });

    async function sendMsg() {
      if (sending) return;   // 防连点 / 竞态
      const text = input.value.trim();
      if (!text) return;
      sending = true;
      bubble('user', text);
      input.value = ''; input.style.height = 'auto';
      send.disabled = true; setStatus(true);
      try {
        const r = await fetch('/api/chat', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message: text })
        });
        const d = await r.json();
        if (d.reply) bubble('assistant', d.reply);
        if (d.id) lastId = Math.max(lastId, d.id);
      } catch (e) {
        bubble('assistant', '⚠️ 连接失败，看看后端是否在运行');
      }
      send.disabled = false; setStatus(false);
      sending = false;
      log.scrollTop = log.scrollHeight;
    }

    send.onclick = sendMsg;
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // ── 功能键 ──
    async function openProfile() {
      memlist.innerHTML = '<div class="memempty">加载中…</div>';
      scrim.classList.add('show'); panel.classList.add('show');
      try {
        const r = await fetch('/api/memories');
        const d = await r.json();
        if (d.memories && d.memories.length) {
          memlist.innerHTML = '';
          d.memories.forEach(m => {
            const el = document.createElement('div'); el.className = 'memitem'; el.textContent = m;
            memlist.appendChild(el);
          });
        } else {
          memlist.innerHTML = '<div class="memempty">还没记下什么，多聊几句她就记住你啦～</div>';
        }
      } catch (e) {
        memlist.innerHTML = '<div class="memempty">读取失败</div>';
      }
    }
    function closeProfile() { scrim.classList.remove('show'); panel.classList.remove('show'); }

    // ── 对话列表（session）──
    const sesspop = document.getElementById('sesspop');
    const sessBody = document.getElementById('sessBody');
    function fmtTime(iso){
      try { return new Date(iso).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
      catch(e){ return ''; }
    }
    function closeOverlays(){ scrim.classList.remove('show'); panel.classList.remove('show'); sesspop.classList.remove('show'); }

    async function openSessions(){
      try{
        const r = await fetch('/api/sessions'); const d = await r.json();
        sessBody.innerHTML = '';
        d.sessions.forEach(s=>{
          const it = document.createElement('div');
          it.className = 'sessitem' + (s.id===d.current ? ' cur' : '');
          const t = document.createElement('span'); t.className='t'; t.textContent = s.title;
          const dt = document.createElement('span'); dt.className='d'; dt.textContent = fmtTime(s.created_at);
          it.appendChild(t); it.appendChild(dt);
          it.onclick = ()=>switchSession(s.id);
          sessBody.appendChild(it);
        });
        scrim.classList.add('show'); sesspop.classList.add('show');
      }catch(e){ toast('读取对话列表失败'); }
    }
    async function newSession(){
      try{ await fetch('/api/session/new', {method:'POST'});
        log.innerHTML=''; lastId=0; closeOverlays(); input.focus(); toast('已新建对话');
      }catch(e){ toast('新建失败'); }
    }
    async function switchSession(id){
      try{ await fetch('/api/session/switch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})});
        log.innerHTML=''; lastId=0; closeOverlays(); await loadHistory();
      }catch(e){ toast('切换失败'); }
    }

    document.getElementById('moreBtn').onclick = openProfile;
    document.getElementById('sessionBtn').onclick = openSessions;
    document.getElementById('sessNew').onclick = newSession;
    scrim.onclick = closeOverlays;
    document.getElementById('backBtn').onclick = () => {
      if (panel.classList.contains('show') || sesspop.classList.contains('show')) closeOverlays();
      else log.scrollTo({ top: 0, behavior: 'smooth' });
    };
    document.getElementById('callBtn').onclick = () => toast('语音通话还没做，下个版本再来～');
    document.getElementById('terminalBtn').onclick = () => toast('终端视图待开发');

    loadHistory();
  </script>
</body>
</html>
